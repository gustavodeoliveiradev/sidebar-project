<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sidebar modular e personalizável com temas dinâmicos" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- CSS Modular -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/themes.css" />

  <title>Nexus Sidebar • Modular UI</title>
</head>

<body>
  <!-- Skip link para acessibilidade -->
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <!-- NOVO: Botão Hamburger (Mobile) -->
  <button class="mobile-toggle" id="mobileToggle" aria-label="Abrir menu">
    <i class="fas fa-bars"></i>
  </button>

  <!-- NOVO: Overlay (Fundo escuro) -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
    <!-- Header da sidebar -->
    <div class="sidebar__header">
      <button class="sidebar__toggle" id="sidebarToggle" aria-expanded="true" aria-controls="sidebar">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="sidebar__logo">
        <i class="fas fa-bolt"></i>
        <span class="sidebar__logo-text">NEXUS</span>
      </div>
    </div>

    <!-- Navegação -->
    <nav class="sidebar__nav">
      <ul class="nav-list" role="menubar">
        <li class="nav-item" role="none">
          <a href="#home" class="nav-link active" role="menuitem" data-tooltip="Início">
            <i class="fas fa-home" aria-hidden="true"></i>
            <span class="nav-text">Início</span>
          </a>
        </li>
        <li class="nav-item" role="none">
          <a href="#profile" class="nav-link" role="menuitem" data-tooltip="Perfil">
            <i class="fas fa-user" aria-hidden="true"></i>
            <span class="nav-text">Perfil</span>
          </a>
        </li>
        <li class="nav-item" role="none">
          <a href="#analytics" class="nav-link" role="menuitem" data-tooltip="Estatísticas">
            <i class="fas fa-chart-pie" aria-hidden="true"></i>
            <span class="nav-text">Estatísticas</span>
          </a>
        </li>
        <li class="nav-item" role="none">
          <a href="#notifications" class="nav-link" role="menuitem" data-tooltip="Notificações">
            <i class="fas fa-bell" aria-hidden="true"></i>
            <span class="nav-text">Notificações</span>
            <span class="nav-badge">3</span>
          </a>
        </li>
        <li class="nav-item" role="none">
          <a href="#settings" class="nav-link" role="menuitem" data-tooltip="Configurações">
            <i class="fas fa-cog" aria-hidden="true"></i>
            <span class="nav-text">Configurações</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer da sidebar -->
    <div class="sidebar__footer">
      <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
        <i class="fas fa-moon"></i>
      </button>
      <a href="#logout" class="nav-link nav-link--danger" role="menuitem" data-tooltip="Sair">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
        <span class="nav-text">Sair</span>
      </a>
    </div>
  </aside>

  <!-- Conteúdo Principal -->
  <main id="main-content" class="main-content">
    <h1>Bem-vindo ao <span class="highlight">Nexus UI</span></h1>
    <p>Uma sidebar modular, acessível e cheia de estilo.</p>
  </main>

  <!-- Scripts Modulares -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
